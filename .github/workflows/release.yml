name: Release

# Build the .vsix and publish it to a GitHub Release whenever a version tag
# (e.g. v0.0.1) is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create the release and upload the .vsix

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npx --yes @vscode/vsce package

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: mrc-viewer ${{ github.ref_name }}
          files: '*.vsix'
          generate_release_notes: true
